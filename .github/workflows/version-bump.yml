name: Version Bump

# Trigger manually from the GitHub Actions UI with a bump-type dropdown.
# The workflow commits the version change back to the source branch,
# creates an annotated git tag, and optionally opens a PR to develop.
on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: "Version bump type"
        required: true
        default: patch
        type: choice
        options:
          - patch   # 1.0.0 → 1.0.1  (bug fixes)
          - minor   # 1.0.0 → 1.1.0  (new features, backwards-compatible)
          - major   # 1.0.0 → 2.0.0  (breaking changes)
          - build   # build number only — keeps marketing version unchanged
      custom_version:
        description: "Override with explicit version (e.g. 2.0.0). Leave blank to use bump_type."
        required: false
        default: ""

permissions:
  contents: write   # push commits + tags
  pull-requests: write

jobs:
  bump:
    name: Bump version (${{ inputs.bump_type }})
    runs-on: macos-15

    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          # Use the branch the workflow was triggered on
          ref: ${{ github.ref }}
          # Full history so we can push back
          fetch-depth: 0

      - name: Select Xcode 16.2
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.2"

      - name: Run bump script
        id: bump
        run: |
          chmod +x scripts/bump_version.sh
          if [[ -n "${{ inputs.custom_version }}" ]]; then
            ./scripts/bump_version.sh set "${{ inputs.custom_version }}"
          else
            ./scripts/bump_version.sh "${{ inputs.bump_type }}"
          fi

      - name: Verify build still succeeds
        run: |
          xcodebuild \
            -project iqamah.xcodeproj \
            -scheme iqamah \
            -configuration Release \
            -destination 'platform=macOS' \
            build \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty --color && exit ${PIPESTATUS[0]}

      - name: Commit and tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add iqamah.xcodeproj/project.pbxproj

          git commit -m "chore(release): bump to v${{ steps.bump.outputs.new_version }} (build ${{ steps.bump.outputs.new_build }})

          - Marketing version: ${{ steps.bump.outputs.prev_version }} → ${{ steps.bump.outputs.new_version }}
          - Build number:      ${{ steps.bump.outputs.prev_build }} → ${{ steps.bump.outputs.new_build }}
          - Triggered by: @${{ github.actor }} (${{ inputs.bump_type }} bump)"

          git tag -a "v${{ steps.bump.outputs.new_version }}" \
            -m "Release v${{ steps.bump.outputs.new_version }} (build ${{ steps.bump.outputs.new_build }})"

          git push origin HEAD
          git push origin "v${{ steps.bump.outputs.new_version }}"

      - name: Summary
        run: |
          echo "## ✅ Version bumped" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | Before | After |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Marketing version | \`${{ steps.bump.outputs.prev_version }}\` | \`${{ steps.bump.outputs.new_version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Build number | \`${{ steps.bump.outputs.prev_build }}\` | \`${{ steps.bump.outputs.new_build }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Tag \`v${{ steps.bump.outputs.new_version }}\` pushed." >> $GITHUB_STEP_SUMMARY
