name: Version Bump

# Automatic triggers:
#   push to main     → detect bump type from Conventional Commits, bump marketing version + build
#   push to develop  → build number only (dev/TestFlight builds stay uniquely identified)
#
# Manual override (workflow_dispatch):
#   Choose bump type explicitly from the GitHub Actions UI dropdown.
#   Use this to force a major bump or set an arbitrary version.
#
# Infinite-loop guard:
#   The bot's own "chore(release):" commits are skipped via two guards:
#     1. if: github.actor != 'github-actions[bot]'
#     2. [skip ci] suffix in the commit message

on:
  push:
    # Auto-bump on develop only — main is protected, bot cannot push directly
    branches: [develop]
    # Trigger only on actual source changes — docs, CI config, and scripts
    # don't need a version bump. paths and paths-ignore cannot be combined;
    # use paths alone and list what we care about.
    paths:
      - 'iqamah/**/*.swift'
      - 'iqamah/**/*.xcassets/**'
      - 'iqamah/Resources/**'
      - 'iqamah.xcodeproj/project.pbxproj'

  workflow_dispatch:
    inputs:
      bump_type:
        description: "Bump type (leave 'auto' to detect from commit history)"
        required: true
        default: auto
        type: choice
        options:
          - auto    # detect from Conventional Commits since last tag
          - patch   # 1.0.0 → 1.0.1
          - minor   # 1.0.0 → 1.1.0
          - major   # 1.0.0 → 2.0.0
          - build   # build number only, no marketing version change
      custom_version:
        description: "Set an explicit version (e.g. 2.0.0). Overrides bump_type."
        required: false
        default: ""

permissions:
  contents: write
  pull-requests: write

# Only one bump runs at a time per branch; never cancel mid-bump (that leaves
# the version in a half-committed state). A second push queues behind the first.
concurrency:
  group: version-bump-${{ github.ref }}
  cancel-in-progress: false

jobs:
  bump:
    name: Version bump
    runs-on: macos-15

    # Skip the bot's own version-bump commits to prevent infinite loops
    if: |
      github.actor != 'github-actions[bot]' &&
      !contains(github.event.head_commit.message, '[skip ci]') &&
      !startsWith(github.event.head_commit.message, 'chore(release):')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0   # full history needed for tag detection

      - name: Select Xcode 16.2
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.2"

      - name: Determine bump type
        id: detect
        run: |
          chmod +x scripts/detect_bump_type.sh

          if [[ -n "${{ inputs.custom_version }}" ]]; then
            # Explicit version override — bump type is irrelevant
            echo "bump_type=set" >> $GITHUB_OUTPUT
            echo "resolved=set ${{ inputs.custom_version }}" >> $GITHUB_OUTPUT

          elif [[ "${{ github.event_name }}" == "push" && "${{ github.ref_name }}" == "develop" ]]; then
            # develop pushes always only bump the build number
            echo "bump_type=build" >> $GITHUB_OUTPUT
            echo "resolved=build (develop push)" >> $GITHUB_OUTPUT

          elif [[ "${{ inputs.bump_type }}" == "auto" || "${{ github.event_name }}" == "push" ]]; then
            # Auto-detect from Conventional Commits
            DETECTED=$(./scripts/detect_bump_type.sh)
            echo "bump_type=$DETECTED" >> $GITHUB_OUTPUT
            echo "resolved=$DETECTED (auto-detected from commits)" >> $GITHUB_OUTPUT

          else
            # Manual workflow_dispatch with explicit choice
            echo "bump_type=${{ inputs.bump_type }}" >> $GITHUB_OUTPUT
            echo "resolved=${{ inputs.bump_type }} (manual)" >> $GITHUB_OUTPUT
          fi

          echo "Resolved bump type: $(cat $GITHUB_OUTPUT | grep '^resolved=' | cut -d= -f2-)"

      - name: Run bump script
        id: bump
        run: |
          chmod +x scripts/bump_version.sh

          if [[ -n "${{ inputs.custom_version }}" ]]; then
            ./scripts/bump_version.sh set "${{ inputs.custom_version }}"
          else
            ./scripts/bump_version.sh "${{ steps.detect.outputs.bump_type }}"
          fi

      - name: Create adhaan stub files for CI build
        run: |
          for name in adhaan_1 adhaan_2 adhaan_3 adhaan_4 adhaan_5 \
                      adhaan_fajr_1 adhaan_fajr_2 adhaan_fajr_3; do
            touch "iqamah/Resources/${name}.mp3"
          done

      - name: Verify Release build still succeeds
        run: |
          xcodebuild \
            -project iqamah.xcodeproj \
            -scheme iqamah \
            -configuration Release \
            -destination 'platform=macOS' \
            build \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty --color && exit ${PIPESTATUS[0]}

      - name: Commit, tag, and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add iqamah.xcodeproj/project.pbxproj

          git commit -m "chore(release): bump to v${{ steps.bump.outputs.new_version }} (build ${{ steps.bump.outputs.new_build }}) [skip ci]

          - Marketing version: ${{ steps.bump.outputs.prev_version }} → ${{ steps.bump.outputs.new_version }}
          - Build number:      ${{ steps.bump.outputs.prev_build }} → ${{ steps.bump.outputs.new_build }}
          - Bump type: ${{ steps.detect.outputs.resolved }}
          - Triggered by: @${{ github.actor }} on ${{ github.ref_name }}"

          # Only create a marketing version tag for non-build-only bumps
          if [[ "${{ steps.detect.outputs.bump_type }}" != "build" ]]; then
            git tag -a "v${{ steps.bump.outputs.new_version }}" \
              -m "Release v${{ steps.bump.outputs.new_version }} (build ${{ steps.bump.outputs.new_build }})"
            git push origin "v${{ steps.bump.outputs.new_version }}"
          fi

          git push origin HEAD

      - name: Job summary
        run: |
          {
            echo "## ✅ Version bumped"
            echo ""
            echo "| | Before | After |"
            echo "|---|---|---|"
            echo "| Marketing version | \`${{ steps.bump.outputs.prev_version }}\` | \`${{ steps.bump.outputs.new_version }}\` |"
            echo "| Build number | \`${{ steps.bump.outputs.prev_build }}\` | \`${{ steps.bump.outputs.new_build }}\` |"
            echo ""
            echo "**Bump type:** ${{ steps.detect.outputs.resolved }}"
            echo ""
            if [[ "${{ steps.detect.outputs.bump_type }}" != "build" ]]; then
              echo "**Tag** \`v${{ steps.bump.outputs.new_version }}\` created and pushed."
            fi
          } >> $GITHUB_STEP_SUMMARY
