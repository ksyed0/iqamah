name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  SCHEME: iqamah
  PROJECT: iqamah.xcodeproj
  XCODE_VERSION: "latest-stable"

jobs:

  # ──────────────────────────────────────────────────────────────────────────
  # 1. LINT — SwiftLint style + rule enforcement
  # ──────────────────────────────────────────────────────────────────────────
  lint:
    name: SwiftLint
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: swiftlint lint --strict --reporter github-actions-logging

  # ──────────────────────────────────────────────────────────────────────────
  # 2. FORMAT — SwiftFormat (replaces Prettier, which is JS-only)
  #    Note: Prettier does not support Swift. SwiftFormat is the equivalent.
  # ──────────────────────────────────────────────────────────────────────────
  format:
    name: SwiftFormat
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install SwiftFormat
        run: brew install swiftformat

      - name: Check formatting
        run: |
          swiftformat --lint iqamah/
          if [ $? -ne 0 ]; then
            echo "::error::SwiftFormat found formatting issues. Run 'swiftformat iqamah/' locally to fix."
            exit 1
          fi

  # ──────────────────────────────────────────────────────────────────────────
  # 3. BUILD — Debug + Release configurations
  # ──────────────────────────────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.configuration }})
    runs-on: macos-latest
    strategy:
      matrix:
        configuration: [Debug, Release]
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode ${{ env.XCODE_VERSION }}
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Build
        run: |
          xcodebuild \
            -project ${{ env.PROJECT }} \
            -scheme ${{ env.SCHEME }} \
            -configuration ${{ matrix.configuration }} \
            -destination 'platform=macOS' \
            build \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty --color && exit ${PIPESTATUS[0]}

  # ──────────────────────────────────────────────────────────────────────────
  # 4. TEST + COVERAGE — run tests, enforce ≥80% code coverage
  # ──────────────────────────────────────────────────────────────────────────
  test:
    name: Test & Coverage
    runs-on: macos-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode ${{ env.XCODE_VERSION }}
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Run tests with coverage
        run: |
          xcodebuild \
            -project ${{ env.PROJECT }} \
            -scheme ${{ env.SCHEME }} \
            -configuration Debug \
            -destination 'platform=macOS' \
            -enableCodeCoverage YES \
            -resultBundlePath TestResults.xcresult \
            test \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty --color && exit ${PIPESTATUS[0]}

      - name: Enforce ≥80% domain coverage
        run: |
          # SwiftUI Views and system-framework wrappers (CoreLocation, AVFoundation)
          # cannot be unit-tested without XCUITest or real hardware — they are excluded.
          # Domain code = Models + Services + PrayerCalculator.
          # Excluded paths (any file whose path contains one of these strings):
          EXCLUDED="Views/|AppDelegate|ContentView|iqamahApp|AppIconGenerator|AppIconView|LocationService|AdhaaanPlayer"
          COVERAGE=$(xcrun xccov view --report --json TestResults.xcresult 2>/dev/null \
            | python3 -c "import sys,json,re; d=json.load(sys.stdin); ex=sys.argv[1]; files=[f for t in d.get('targets',[]) for f in t.get('files',[]) if not re.search(ex,f.get('path',''))]; te=sum(f.get('executableLines',0) for f in files); tc=sum(f.get('coveredLines',0) for f in files); print(f'{(tc/te*100) if te>0 else 0:.1f}')" "$EXCLUDED" \
            2>/dev/null || echo "0")

          echo "Domain code coverage: ${COVERAGE}% (Views/system wrappers excluded)"

          if (( $(echo "$COVERAGE < 80.0" | bc -l) )); then
            echo "::error::Domain coverage ${COVERAGE}% is below the required 80% threshold."
            exit 1
          fi
          echo "::notice::Domain coverage ${COVERAGE}% meets the ≥80% requirement."


      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: TestResults.xcresult
          retention-days: 7

  # ──────────────────────────────────────────────────────────────────────────
  # 5. SECURITY — CodeQL static analysis for Swift
  # ──────────────────────────────────────────────────────────────────────────
  security:
    name: CodeQL Security Scan
    runs-on: macos-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode ${{ env.XCODE_VERSION }}
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: swift
          queries: security-extended,security-and-quality

      - name: Build for CodeQL
        run: |
          xcodebuild \
            -project ${{ env.PROJECT }} \
            -scheme ${{ env.SCHEME }} \
            -configuration Debug \
            -destination 'platform=macOS' \
            build \
            CODE_SIGNING_ALLOWED=NO

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:swift"

  # ──────────────────────────────────────────────────────────────────────────
  # 6. FILE SIZE GUARD — .app bundle must not exceed 50 MB (Release build)
  # ──────────────────────────────────────────────────────────────────────────
  file-size:
    name: File Size Guard
    runs-on: macos-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode ${{ env.XCODE_VERSION }}
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Build Release
        run: |
          xcodebuild \
            -project ${{ env.PROJECT }} \
            -scheme ${{ env.SCHEME }} \
            -configuration Release \
            -destination 'platform=macOS' \
            -derivedDataPath DerivedData \
            build \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty --color && exit ${PIPESTATUS[0]}

      - name: Check .app bundle size (≤ 50 MB)
        run: |
          APP=$(find DerivedData -name "*.app" -maxdepth 6 | head -1)
          if [ -z "$APP" ]; then
            echo "::error::Could not find .app bundle in DerivedData"
            exit 1
          fi
          SIZE_MB=$(du -sm "$APP" | cut -f1)
          echo "Bundle size: ${SIZE_MB} MB  (path: $APP)"
          if [ "$SIZE_MB" -gt 50 ]; then
            echo "::error::Bundle size ${SIZE_MB} MB exceeds the 50 MB budget."
            exit 1
          fi
          echo "::notice::Bundle size ${SIZE_MB} MB is within the 50 MB budget."

  # ──────────────────────────────────────────────────────────────────────────
  # 7. PR TITLE — enforce Conventional Commits format
  # ──────────────────────────────────────────────────────────────────────────
  pr-title:
    name: PR Title Convention
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Check PR title format
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            test
            chore
            perf
            ci
          requireScope: false
