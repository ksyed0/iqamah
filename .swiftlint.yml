included:
  - iqamah

excluded:
  - iqamah/AppIconGenerator.swift
  - iqamah/AppIconView.swift   # icon export utility — not shipped code
  - Tests

opt_in_rules:
  - array_init
  - closure_spacing
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - empty_collection_literal
  - empty_count
  - explicit_init
  - fallthrough
  - fatal_error_message
  - first_where
  - force_unwrapping
  - last_where
  - literal_expression_end_indentation
  - operator_usage_whitespace
  - overridden_super_call
  - prefer_self_type_over_type_of_self
  - redundant_nil_coalescing
  - strict_fileprivate
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - yoda_condition

# Rules that require `swiftlint analyze` (not `swiftlint lint`)
analyzer_rules:
  - unused_import

disabled_rules:
  - trailing_whitespace                    # Xcode + SwiftFormat handle this
  - todo                                   # TODOs tracked in BUGS.md; don't block CI
  - trailing_comma                         # SwiftFormat owns trailing-comma style; avoid conflict
  - multiple_closures_with_trailing_closure  # SwiftUI idiom — .onChange { _, v in } etc.
  - large_tuple                            # PrayerTimes.prayers uses (name, time) tuples intentionally
  - implicit_optional_initialization       # @State var foo: T? = nil is explicit and clear
  - discouraged_object_literal             # not applicable to this codebase

line_length:
  warning: 200
  error: 250
  ignores_urls: true
  ignores_comments: true
  ignores_interpolated_strings: true

type_body_length:
  warning: 400
  error: 600

file_length:
  warning: 600
  error: 900

function_body_length:
  warning: 80
  error: 150

cyclomatic_complexity:
  warning: 15
  error: 25

identifier_name:
  min_length:
    warning: 1
    error: 1
  excluded:
    - id
    - db
    - tz
    - x
    - y
    - i
    - m     # mean anomaly / mean solar noon (astronomical)
    - e     # eccentricity (astronomical)
    - t     # Julian centuries (astronomical)
    - a     # intermediate Julian Day calculation
    - b     # intermediate Julian Day calculation
    - c     # country / intermediate var
    - w     # width (geometry)
    - h     # height (geometry)

type_name:
  excluded:
    - ID
    - iqamahApp  # @main entry point — must match module name, lowercase intentional
